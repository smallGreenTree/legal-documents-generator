        country: CZ
        role: Sole tenderer / contractor

  scenario_brief:
    title: "case {legal_reference} - procurement fraud and corruption"
    offence: "procurement fraud and corruption"
    legal_basis:
      - "Article 2(2)(b) and Article 4(3) PIF Directive"
      - "Article 90(9)(1) of the Czechish Public Procurement Act"
      - "Article 282(2) of the Czechish Criminal Code"
    particulars: >
      The present case deals with alleged misconduct in office by
      {first_defendant}, the {first_defendant_role} of the Czechish Transport
      Ministry. The alleged misconduct happened in a public procurement
      procedure for the construction, implementation and maintenance of a sound
      surveillance system in 80 branches of the transport ministry, partly
      funded by the European Social Fund. The conduct, if proved, would
      constitute misconduct in office under Article 282(2) of the Czechish
      Criminal Code. {first_defendant} launched the public tender. Only one
      tender was submitted to the platform, by {first_company}, acting as the
      {first_company_role}, and that tender was evaluated by a committee
      appointed by {first_defendant}. The ranking was announced and the contract
      was signed with the sole participating company.
    procurement_irregularity: >
      The managing authority imposed a financial correction of 10% of the
      contract value, represented in this synthetic case as {total_loss}, based
      on the alleged lack of sufficient description of the severity of the
      award criteria. The tender weighting gave 10 points to the price for
      construction and implementation of the sound surveillance system and 90
      points to the monthly maintenance subscription fee. The managing
      authority treated that weighting as a breach of Article 90(9)(1) of the
      Czechish Public Procurement Act.
    fixed_facts:
      - "The procurement concerned a sound surveillance system."
      - "The system covered 80 branches of the Czechish Transport Ministry."
      - "The project was partly funded by the European Social Fund."
      - "Only one tender was submitted to the platform."
      - "The financial correction was 10% of the contract value."

