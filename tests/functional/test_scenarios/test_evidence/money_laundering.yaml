fraud_statutes:
  money_laundering:
    - offence: "CONCEALING CRIMINAL PROPERTY"
      statute: "section 327 of the Proceeds of Crime Act 2002"
      particulars: >
        {defendants} between {start_date} and {end_date} concealed, disguised,
        converted and transferred criminal property, namely the proceeds of fraud,
        by routing funds through {companies} and a series of nominee accounts,
        knowing or suspecting that the property constituted or represented a
        person's benefit from criminal conduct.
    - offence: "ACQUIRING CRIMINAL PROPERTY"
      statute: "section 329 of the Proceeds of Crime Act 2002"
      particulars: >
        {defendants} between {start_date} and {end_date} acquired, used and
        possessed criminal property, namely funds derived from fraud, transferred
        through {companies}, knowing or suspecting the same to be criminal property.
