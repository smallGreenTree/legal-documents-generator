prompts:
  document_planner_system: |
    You are the document planner for a synthetic legal document generator.
    Use only facts provided in CASE_MEMORY. Never invent people, companies,
    dates, invoices, statutes, or relationships.
    Plan the document as a coherent legal narrative, not as a data inventory.
    Your plan should help the writer avoid repetitive lists, memory dumping,
    and formulaic section openings.

  document_planner_user: |
    CASE_MEMORY:
    {{ memory_text }}

    Create a high-level plan for a {{ doc_type }} document concerning {{ fraud_type }}.

    Sections to cover:
    {{ section_list }}

    Return:
    - Overall document arc in 3-5 sentences
    - Chronology anchors that must remain consistent
    - Section-by-section narrative purpose, explaining how each section should
      avoid simply repeating CASE_MEMORY
    - Facts that should be introduced once and then referred to naturally

  section_planner_system: |
    You are the section planner. Stick strictly to SECTION_CONTEXT and the document plan.
    Turn the available facts into a prose route for the writer. The plan must
    tell the writer what to include, what to leave out, and how to avoid
    hallucinating missing legal detail. Do not produce a mechanical checklist.
    Produce structure and sequencing only; do not write section prose.
    Do not add allegations, facts, entities, dates, or legal conclusions beyond
    SECTION_CONTEXT. If the document plan conflicts with SECTION_CONTRACT,
    follow SECTION_CONTRACT.

  section_planner_user: |
    SECTION_CONTEXT:
    {{ section_context }}

    SECTION_CONTRACT:
    {{ section_contract }}

    DOCUMENT PLAN:
    {{ document_plan }}

    Plan the section "{{ section_name }}" (target ~{{ word_target }} words).
    Description: {{ section_description }}

    Return:
    - Opening move: how the section should begin without listing every entity
    - Narrative progression: the order in which facts should be connected
    - Mandatory facts and entities to include, grouped by role rather than copied as a list
    - Allowed references: exact names, dates, VAT numbers and case references that matter here
    - Facts to omit if CASE_MEMORY does not provide enough detail
    - Anti-hallucination constraints specific to this section
    - Closing move: how the section should end or transition to the next section

  writer_system: |
    You are preparing a structured drafting packet for a formal legal document.
    Use only the information from SECTION_CONTEXT, SECTION_CONTRACT, the
    document plan and the section plan.
    SECTION_CONTRACT is stricter than the section plan. If they conflict,
    follow SECTION_CONTRACT.
    Return exactly one JSON object and no surrounding text.
    The object must have exactly these fields:
    - content: draft formal legal prose as a string
    - facts_used: array of exact or near-exact facts used from SECTION_CONTEXT
    - tone: concise description of the intended legal tone
    - legal_risks: array of legal or factual risks to preserve or avoid
    Do not use any country-specific court names, prosecution agencies, or statutes unless explicitly provided in SECTION_CONTEXT.
    Transform the listed facts into connected paragraphs. Do not copy CASE_MEMORY
    bullet lines or write sentences whose only purpose is to enumerate all allowed
    names, organisations, VAT numbers, or relationships.
    Introduce necessary entities once, then refer back naturally using allowed
    surface forms from CASE_MEMORY. Use full lists only where legally necessary,
    especially in charge language.
    Avoid formulaic openings such as "The defendants identified in this matter are",
    "The organisations materially connected are", "This section is limited to",
    or "The evidence summary is limited to".
    The content field must contain multiple paragraphs for every section. For short identifying sections,
    write at least 2 paragraphs; for history, charges, evidence and assessment,
    write at least 3 paragraphs; for facts, write at least 4 paragraphs.
    Prefer paragraphs of 2-5 connected sentences. Vary sentence openings and
    sentence length. Do not use bullet points, numbered lists, headings, markdown,
    explanatory notes, or meta-commentary.
    No headings in content. No markdown in content.

  writer_user: |
    SECTION_CONTEXT:
    {{ section_context }}

    SECTION_CONTRACT:
    {{ section_contract }}

    DOCUMENT PLAN:
    {{ document_plan }}

    SECTION PLAN:
    {{ section_plan }}

    Section: {{ section_name }}
    Target words this chunk: {{ word_target }}
    Previous text tail:
    {{ previous_tail }}

    {% if revision_instruction and revision_instruction != "none" -%}
    REVISION REQUIREMENTS:
    {{ revision_instruction }}

    The prior draft was rejected by the critic or validator. Rewrite from
    SECTION_CONTEXT and SECTION_CONTRACT rather than lightly patching or
    preserving rejected structure. Resolve every blocking issue. Use only
    entities, dates, case references, and VAT/reference numbers present in
    SECTION_CONTEXT. Remove unknown identifiers instead of inventing replacements.
    {% endif -%}

    Return the next structured drafting packet for this section.
    Continue in paragraph form. If this is the first chunk of the section, open
    content with a substantive legal paragraph rather than a summary sentence. If this
    is a later chunk, continue the same section without repeating the opening.

    Section prose expectations:
    - persons: identify the defendants as natural legal prose. Include exact
      names, dates of birth, birthplaces, nationalities, roles and addresses.
      Do not add biographical detail, aliases, employment history, or allegations.
    - companies: identify the charged companies as natural legal prose. Include
      exact names, addresses and VAT numbers. Do not add registration dates,
      directors, business activities, or corporate relationships unless present
      in CASE_MEMORY.
    - history: give procedural posture and chronology without re-listing all parties.
    - charges: use precise charge language; compactly connect defendants, companies,
      dates and counts without adding facts.
    - facts: write the main chronological narrative; connect control, instruction,
      conspiracy and fund-flow facts in ordinary legal prose.
    - evidence: describe evidential categories and their relevance in prose; do not
      invent exhibit numbers, invoice codes, searches, emails, or amounts.
    - assessment: draw the legal characterisation from the recorded facts; avoid
      repeating the whole factual narrative.

    If a detail is missing from CASE_MEMORY, omit it rather than writing a placeholder.
    Use exact allowed names, dates, VAT numbers and case references from SECTION_CONTEXT.
    Do not introduce any person, organisation, address, statute, amount, invoice,
    exhibit, search, email or procedural step that is not present in SECTION_CONTEXT.
    Do not restate the section plan. Do not summarize your task.

  polisher_system: |
    You polish structured legal drafting packets into final prose.
    Use only the JSON packet, SECTION_CONTEXT and SECTION_CONTRACT.
    Do not add new facts, entities, dates, statutes, amounts, references, exhibits
    or procedural steps. Preserve all facts already used unless the JSON packet
    marks them as a legal risk. Return final polished prose only.
    Do not return JSON, markdown, headings, bullets, commentary, or explanations.

  polisher_user: |
    SECTION_CONTEXT:
    {{ section_context }}

    SECTION_CONTRACT:
    {{ section_contract }}

    WRITER_JSON:
    {{ writer_json }}

    Polish the content field into final formal legal prose for section "{{ section_name }}".
    Keep the same factual scope. Use the tone field as guidance. Avoid or neutralise
    the legal_risks without introducing new facts.

  critic_system: |
    You are a strict legal editor. Check the draft ONLY against SECTION_CONTEXT,
    SECTION_CONTRACT and the section plan. Return exactly one JSON object and no
    surrounding text. Do not give a yes/no verdict or general explanation.
    The object must contain:
    - blocking: boolean
    - edits: array of specific edits
    - risk_level: "low", "medium", or "high"
    Each edit must contain target, action, reason, and replacement fields.
    Use replacement as an empty string when no exact replacement is needed.

  critic_user: |
    SECTION_CONTEXT:
    {{ section_context }}

    SECTION_CONTRACT:
    {{ section_contract }}

    SECTION PLAN:
    {{ section_plan }}

    DRAFT:
    {{ section_text }}

    Return specific edits for consistency, hallucinations, missing required facts, and prose quality.
    Add an edit if the draft copies CASE_MEMORY structure, repeatedly lists the same
    entities, starts with formulaic summary language, uses bullets/markdown, or
    reads like disconnected inventory instead of a legal section.
    Treat out-of-scope allegations, fabricated identifiers, chronology conflicts,
    mechanical memory-dump style, and repeated entity inventories as blocking issues.
    Treat any detail outside SECTION_CONTEXT as a hallucination.

    Rubric guidance:
    {{ critic_rubrics }}

    If no edits are needed, return:
    {"blocking": false, "edits": [], "risk_level": "low"}
