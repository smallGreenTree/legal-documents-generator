
paths:
  output_dir: output
  schema_dir: schemas
  memory_dir: memory

ollama:
  base_url: http://localhost:11434
  model: qwen3:8b
  timeout: 900

model_routing:
  default:
    provider: ollama
    base_url: http://localhost:11434
    model: qwen3:8b
    timeout: 900
  stages:
    planner:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3:8b
      timeout: 900
    writer:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3:8b
      timeout: 900
    critic:
      provider: gemini
      base_url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-2.5-flash
      api_key_env: GEMINI_API_KEY
      timeout: 900

langfuse:
  enabled: true
  host: http://localhost:3000
  public_key_env: LANGFUSE_PUBLIC_KEY
  secret_key_env: LANGFUSE_SECRET_KEY

generation:
  words_per_page: 500

entity_variants:
  persons:
    enabled: true
    generation:
      nickname_variants: 1
      misspelling_variants: 1
      locale_aware: false

workflow:
  mode: langgraph
  max_revisions: 2
  memory_summary_chars: 900

  planner:
    temperature: 0.0
    max_output_tokens:
      document: 2000
      section: 1200

  writer:
    chunk_words: 500
    context_tail_chars: 900
    temperature: 0.0
    max_output_tokens: 2500
    min_output_tokens: 1200
    output_token_multiplier: 1.8

  critic:
    temperature: 0.0
    max_output_tokens: 1200
    memory_char_limit: 6000
    section_text_char_limit: 3500
    rubrics:
      grounding: "1-5"
      completeness: "1-5"
      legal_style: "1-5"
      chronology: "1-5"

  prompts_config_path: configs/workflow_prompts.yaml
