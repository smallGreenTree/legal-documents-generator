paths:
  output_dir: output
  schema_dir: schemas
  memory_dir: memory

model_routing:
  stages:
    planner:
      provider: ollama
      base_url: http://localhost:11434
      model:  qwen3.6:27b
      num_ctx: 8192
      think: false
      top_p: 0.9
      timeout: 900
      recovery:
        max_generate_attempts: 1
        retry_backoff_seconds: 5
        controlled_empty_section: "[section not generated- ERROR dude]]"
    writer:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3.6:27b
      num_ctx: 8192
      think: false
      top_p: 0.9
      timeout: 900
      recovery:
        max_generate_attempts: 1
        retry_backoff_seconds: 5
        controlled_empty_section: "[section not generated - ERROR dude]"
    critic:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3.6:27b
      num_ctx: 8192
      think: false
      top_p: 0.9
      timeout: 900
      recovery:
        max_generate_attempts: 1
        retry_backoff_seconds: 5
        controlled_empty_section: "[section not generated- ERROR dude]"

langfuse:
  enabled: true
  host: http://localhost:3000
  public_key_env: LANGFUSE_PUBLIC_KEY
  secret_key_env: LANGFUSE_SECRET_KEY

generation:
  words_per_page: 500

entity_variants:
  persons:
    enabled: true
    generation:
      nickname_variants: 2
      misspelling_variants: 2
      locale_aware: false

workflow:
  mode: langgraph
  max_revisions: 2
  memory_summary_chars: 900
  prefect_dialogue:
    generated_case_config_pattern: config_case/generated/{doc_id}.yaml

  validators:
    # Necessary deterministic safety checks.
    empty_section: true
    placeholder_text: true
    hidden_reasoning_markup: true
    placeholder_markers: true
    review_metadata: true
    markdown_formatting: true
    minimum_length: false
    required_person_facts: true
    required_company_facts: true
    known_entity_presence: true
    unknown_case_references: true
    unknown_dates: true
    unknown_amounts: true
    unknown_vat_numbers: true
    unknown_organisations: true
    unknown_titled_people: true
    unknown_initials: true

    # Optional/legacy prose-shaping checks.
    meta_summary_style: false
    incomplete_date_range: false
    dangling_between_phrase: false
    unresolved_timeline_placeholder: false
    partial_vat_identifier: false
    repeated_long_sentences: false
    repeated_sentence_fragments: false
    truncated_sentence: false
    facts_contract: false

  planner:
    active: false
    temperature: 0.0
    max_output_tokens:
      document: 2000
      section: 1200

  writer:
    active: true
    chunk_words: 900
    context_tail_chars: 900
    temperature: 1
    max_output_tokens: 2500
    min_output_tokens: 1200
    output_token_multiplier: 1.8
    min_completion_ratio: 0.7

  critic:
    active: true
    acceptance_threshold: 3.5
    temperature: 0.0
    max_output_tokens: 1200
    memory_char_limit: 6000
    section_text_char_limit: 3500
    rubrics:
      grounding: "1-5"
      completeness: "1-5"
      chronology: "1-5"

  prompts_config_path: prompts/workflow_prompts.yaml
