
paths:
  output_dir: output
  schema_dir: schemas
  memory_dir: memory

model_routing:
  stages:
    planner:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3.6:27b
      num_ctx: 8192
      think: false
      timeout: 900
      recovery:
        max_generate_attempts: 3
        retry_backoff_seconds: 5
        controlled_empty_section: "[section not generated]"
    writer:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3.6:27b
      num_ctx: 8192
      think: false
      timeout: 900
      recovery:
        max_generate_attempts: 3
        retry_backoff_seconds: 5
        controlled_empty_section: "[section not generated]"
    critic:
      provider: ollama
      base_url: http://localhost:11434
      model: qwen3.6:27b
      num_ctx: 8192
      think: false
      timeout: 900
      recovery:
        max_generate_attempts: 3
        retry_backoff_seconds: 5
        controlled_empty_section: "[section not generated]"

langfuse:
  enabled: true
  host: http://localhost:3000
  public_key_env: LANGFUSE_PUBLIC_KEY
  secret_key_env: LANGFUSE_SECRET_KEY

generation:
  words_per_page: 500

entity_variants:
  persons:
    enabled: true
    generation:
      nickname_variants: 1
      misspelling_variants: 1
      locale_aware: false

workflow:
  mode: langgraph
  max_revisions: 2
  memory_summary_chars: 900

  planner:
    temperature: 0.0
    max_output_tokens:
      document: 2000
      section: 1200

  writer:
    chunk_words: 500
    context_tail_chars: 900
    temperature: 0.0
    max_output_tokens: 2500
    min_output_tokens: 1200
    output_token_multiplier: 1.8

  critic:
    temperature: 0.0
    max_output_tokens: 1200
    memory_char_limit: 6000
    section_text_char_limit: 3500
    rubrics:
      grounding: "1-5"
      completeness: "1-5"
      legal_style: "1-5"
      chronology: "1-5"

  prompts_config_path: prompts/workflow_prompts.yaml
