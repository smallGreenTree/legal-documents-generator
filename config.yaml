# =============================================================================
# Synthetic Legal NER Generator
# Rule: only configure DECISIONS. Constants and generated values live in code.
# =============================================================================

# ── System ────────────────────────────────────────────────────────────────────

paths:
  output_dir: output
  schema_dir: schemas
  memory_dir: memory
  trace_dir: traces

ollama:
  base_url: http://localhost:11434
  model: qwen3:8b
  timeout: 180

langfuse:
  enabled: true
  base_url: https://cloud.langfuse.com
  public_key_env: LANGFUSE_PUBLIC_KEY
  secret_key_env: LANGFUSE_SECRET_KEY

generation:
  words_per_page: 500

profile:
  doc_type:   indictment
  fraud_type: financial_fraud
  documents: 1
  section_words:
    history: 720
    charges: 500
    facts: 2200
    evidence: 500
    assessment: 700

workflow:
  mode: langgraph
  max_revisions: 2
  memory_summary_chars: 900

  planner:
    temperature: 0.0

  writer:
    chunk_words: 500
    context_tail_chars: 900
    temperature: 0.0

  critic:
    temperature: 0.1

  prompts:
    document_planner_system: |
      You are the document planner for a synthetic UK legal document generator.
      Use only facts provided in CASE_MEMORY. Never invent people, companies,
      dates, invoices, statutes, or relationships.
      Return concise planning bullets in formal legal language.

    document_planner_user: |
      CASE_MEMORY:
      {{ memory_text }}
  
      Create a high-level plan for a {{ doc_type | upper }} document concerning {{ fraud_type | replace("_", " ") }}.
  
      Sections to cover:
      {{ section_list }}
  
      Return:
      - Short chronology of key events
      - Key facts that must remain consistent
      - Purpose of each section

    section_planner_system: |
      You are the section planner. Stick strictly to CASE_MEMORY and the document plan.

    section_planner_user: |
      CASE_MEMORY:
      {{ memory_text }}

      DOCUMENT PLAN:
      {{ document_plan }}

      Plan the section "{{ section_name }}" (target ~{{ word_target }} words).
      Description: {{ section_description }}

      Return:
      - Required facts
      - Entities to mention with exact names
      - Logical order of points

    writer_system: |
      You are writing a formal legal document.
      Use only the information from CASE_MEMORY, the document plan and the section plan.
      Write in clear, formal, neutral legal language.
      Do not use any country-specific court names, prosecution agencies, or statutes unless explicitly provided in CASE_MEMORY.
      No headings in the output. No markdown.

    writer_user: |
      CASE_MEMORY:
      {{ memory_text }}

      DOCUMENT PLAN:
      {{ document_plan }}

      SECTION PLAN:
      {{ section_plan }}

      Section: {{ section_name }}
      Target words this chunk: {{ word_target }}
      Previous text tail:
      {{ previous_tail }}

      Write the next formal legal passage.

    critic_system: |
      You are a strict critic. Check the draft ONLY against CASE_MEMORY and the section plan.

    critic_user: |
      CASE_MEMORY:
      {{ memory_text }}

      SECTION PLAN:
      {{ section_plan }}

      DRAFT:
      {{ section_text }}

      Review for consistency, hallucinations, and missing required facts.

      Respond exactly in this format:
      APPROVED: yes|no
      ISSUES:
      - ...
      REVISION:
      one short instruction



# ── Case source of truth ──────────────────────────────────────────────────────
#
# Keep fields as `auto` to preserve the current generator behavior.
# Replace them with explicit values only when you want the config file to hold
# the fully resolved case.
#
# `cast` = generation specs
# `defendants` / `collateral` / `charged_orgs` / `associated_orgs` = explicit records
# `schema` = embedded case schema (same shape as case_schema.json)
# `prose` = explicit section prose; leave entries as `auto` to generate them
# `counts` = explicit indictment counts

case:
  metadata:
    court: auto
    case_number: auto
    cross_ref: auto
    filing_date: auto
    offence_period:
      start: auto
      end: auto

  cast:
    # 3 main defendants — per-person control because surface_forms differs
    defendants:
      - nationality: DE
        title: Dr
        surface_forms: 2        # full name + initials
      - nationality: IT
        title: Mr
        surface_forms: 2        # full name + initials
      - nationality: FR
        title: Ms
        surface_forms: 1        # full name only

    # 10 witnesses spread across 4 EU countries
    collateral:
      - nationality: DE
        title: ""
        surface_forms: 1
      - nationality: DE
        title: ""
        surface_forms: 1
      - nationality: DE
        title: ""
        surface_forms: 1
      - nationality: IT
        title: ""
        surface_forms: 1
      - nationality: IT
        title: ""
        surface_forms: 1
      - nationality: IT
        title: ""
        surface_forms: 1
      - nationality: FR
        title: ""
        surface_forms: 1
      - nationality: FR
        title: ""
        surface_forms: 1
      - nationality: PL
        title: ""
        surface_forms: 1
      - nationality: PL
        title: ""
        surface_forms: 1

    charged_orgs:    5          # formally listed in Section II
    associated_orgs: 5          # mentioned in prose only — total 10 companies

  defendants: auto
  collateral: auto
  charged_orgs: auto
  associated_orgs: auto
  schema: auto
  prose:
    history: auto
    charges: auto
    facts: auto
    evidence: auto
    assessment: auto
  counts: auto

