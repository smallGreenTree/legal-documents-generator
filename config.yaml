
paths:
  output_dir: output
  schema_dir: schemas
  memory_dir: memory

ollama:
  base_url: http://localhost:11434
  model: qwen3:8b
  timeout: 900

langfuse:
  enabled: true
  host: http://localhost:3000
  public_key_env: LANGFUSE_PUBLIC_KEY
  secret_key_env: LANGFUSE_SECRET_KEY

generation:
  words_per_page: 500

profile:
  doc_type:   indictment
  fraud_type: financial_fraud
  documents: 1
  section_words:
    history: 200
    charges: 200
    facts: 500
    evidence: 200
    assessment: 300

workflow:
  mode: langgraph
  max_revisions: 2
  memory_summary_chars: 900

  planner:
    temperature: 0.0
    max_output_tokens:
      document: 2000
      section: 1200

  writer:
    chunk_words: 500
    context_tail_chars: 900
    temperature: 0.0
    max_output_tokens: 2500
    min_output_tokens: 1200
    output_token_multiplier: 1.8

  critic:
    temperature: 0.0
    max_output_tokens: 1200
    memory_char_limit: 6000
    section_text_char_limit: 3500
    rubrics:
      grounding: "1-5"
      completeness: "1-5"
      legal_style: "1-5"
      chronology: "1-5"

  prompts_config_path: configs/workflow_prompts.yaml


case:
  metadata:
    court: auto
    case_number: auto
    cross_ref: auto
    filing_date: auto
    offence_period:
      start: auto
      end: auto

  cast:
    # 3 main defendants — per-person control because surface_forms differs
    defendants:
      - nationality: DE
        title: Dr
        surface_forms: 2        # full name + initials
        nickname_variants: 1    # e.g. Nickolas Herz -> Nick Herz
        misspelling_variants: 1 # e.g. Nickolas Herz -> Nickolas Hertz
